<!DOCTYPE html>
<html>

<head>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      height: 100vh;
      background-color: #000000;
      color: #FFFFFF;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
      margin: 16px 0;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .header {
      padding: 12px 12px 8px 12px;
      background-color: transparent;
      z-index: 10;
    }

    .main-scroll-area {
      flex: 1;
      overflow-y: auto;
      padding: 8px 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .footer {
      padding: 12px;
      background-color: transparent;
      z-index: 10;
    }

    .card {
      background-color: #1C1C1E;
      border-radius: 12px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    label {
      font-size: 11px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.6);
      text-transform: uppercase;
      letter-spacing: -0.2px;
      display: block;
      margin-bottom: 4px;
      margin-left: 4px;
    }

    input[type="text"],
    textarea {
      width: 100%;
      padding: 8px 10px;
      background-color: #2C2C2E;
      border: none;
      border-radius: 8px;
      color: white;
      font-family: inherit;
      font-size: 13px;
      box-sizing: border-box;
      transition: background-color 0.2s ease;
    }

    textarea {
      resize: none;
      height: 60px;
      line-height: 1.4;
    }

    input:focus,
    textarea:focus {
      outline: none;
      background-color: #3A3A3C;
    }

    input::placeholder,
    textarea::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }

    .colors {
      display: flex;
      justify-content: space-between;
    }

    .color-swatch {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.1s ease, border-color 0.2s;
    }

    .color-swatch:hover {
      transform: scale(1.15);
    }

    .color-swatch.selected {
      border-color: #FFFFFF;
      box-shadow: 0 0 0 2px #000000;
      transform: scale(1.15);
    }

    button {
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      border-radius: 10px;
      padding: 10px 12px;
      cursor: pointer;
      box-sizing: border-box;
      transition: all 0.2s ease;
      width: 100%;
      border: none;
    }

    button.primary {
      background-color: #0A84FF;
      color: white;
      letter-spacing: -0.2px;
    }

    button.primary:hover {
      background-color: #0070DF;
    }

    button.secondary {
      background-color: #1C1C1E;
      color: #0A84FF;
      text-align: center;
    }

    button.secondary:hover {
      background-color: #2C2C2E;
      color: #0A84FF;
    }

    .item-card {
      background-color: #1C1C1E;
      border-radius: 12px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      position: relative;
    }

    .item-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .remove-btn {
      background: rgba(255, 255, 255, 0.1);
      border: none;
      color: #FF453A;
      border-radius: 8px;
      cursor: pointer;
      padding: 4px;
      font-size: 14px;
      line-height: 1;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 400;
    }

    .remove-btn:hover {
      background: rgba(255, 69, 58, 0.2);
      color: #FF5A50;
    }

    #items-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Segmented Control */
    .segmented-control {
      background-color: #1C1C1E;
      border-radius: 8px;
      display: flex;
      padding: 4px;
      margin-bottom: 20px;
    }

    .segment {
      flex: 1;
      text-align: center;
      padding: 6px 0;
      font-size: 13px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.6);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .segment.active {
      background-color: #3A3A3C;
      color: #FFFFFF;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.2);
    }

    /* Switch */
    .switch {
      position: relative;
      display: inline-block;
      width: 32px;
      height: 18px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
      margin: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(255, 255, 255, 0.15);
      transition: .2s;
      border-radius: 18px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 14px;
      width: 14px;
      left: 2px;
      bottom: 2px;
      background-color: white;
      transition: .2s;
      border-radius: 50%;
    }

    input:checked+.slider {
      background-color: #0A84FF;
    }

    input:checked+.slider:before {
      transform: translateX(14px);
    }
  </style>
</head>

<body>
  <div class="header">
    <div class="segmented-control" id="theme-control">
      <div class="segment active" data-theme="dark">Dark</div>
      <div class="segment" data-theme="light">Light</div>
    </div>
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
      <label style="margin: 0;">Connector Color</label>
      <div style="display: flex; align-items: center; gap: 8px;">
        <span style="font-size: 11px; color: #888; font-weight: 500;">Match Stroke</span>
        <label class="switch">
          <input type="checkbox" id="match-stroke" onchange="toggleMatchStroke(this.checked)">
          <span class="slider"></span>
        </label>
      </div>
    </div>
    <div class="card" style="padding: 10px 12px;">
      <div class="colors" id="connector-colors"></div>
    </div>
  </div>

  <div class="main-scroll-area">
    <label>Annotations</label>
    <div id="items-container"></div>
    <button class="secondary" id="add-item">+ Add Note</button>
  </div>

  <div class="footer">
    <button class="primary" id="save-btn">Create Annotation</button>
  </div>

  <script>
    const COLORS = [
      '#F24822', // Red
      '#FFA629', // Orange
      '#FFCD29', // Yellow
      '#14AE5C', // Green
      '#18A0FB', // Blue
      '#9747FF', // Purple
      '#F248A8'  // Pink
    ];

    let state = {
      mode: 'create', // 'create' or 'edit'
      theme: 'dark',
      matchStroke: false,
      connectorColor: '#F24822',
      items: [
        { id: Date.now().toString(), title: '', desc: '', color: '#18A0FB' }
      ]
    };

    function renderColorSwatches(containerEl, selectedColor, onSelect) {
      containerEl.innerHTML = '';
      COLORS.forEach(color => {
        const swatch = document.createElement('div');
        swatch.className = `color-swatch ${color === selectedColor ? 'selected' : ''}`;
        swatch.style.backgroundColor = color;
        swatch.onclick = () => onSelect(color);
        containerEl.appendChild(swatch);
      });
    }

    function renderItems() {
      const container = document.getElementById('items-container');
      container.innerHTML = '';

      state.items.forEach((item, index) => {
        const card = document.createElement('div');
        card.className = 'item-card';

        card.innerHTML = `
          <div class="item-header">
            <span style="font-size: 12px; color: #888;">Note ${index + 1}</span>
            ${state.items.length > 1 ? `<button class="remove-btn" onclick="removeItem('${item.id}')">&times;</button>` : ''}
          </div>
          <input type="text" placeholder="Short Label (e.g. BID)" value="${item.title}" oninput="updateItem('${item.id}', 'title', this.value)" />
          <div class="colors" id="colors-${item.id}"></div>
          <textarea placeholder="Detailed description..." oninput="updateItem('${item.id}', 'desc', this.value)">${item.desc}</textarea>
        `;

        container.appendChild(card);
        renderColorSwatches(document.getElementById(`colors-${item.id}`), item.color, (newColor) => {
          updateItem(item.id, 'color', newColor);
          updateItemsWithoutLosingFocus(state.items); // Smart re-render!
        });
      });
    }

    function renderGlobal() {
      // Theme toggles
      const themeSegments = document.querySelectorAll('#theme-control .segment');
      themeSegments.forEach(seg => {
        if (seg.dataset.theme === state.theme) {
          seg.classList.add('active');
        } else {
          seg.classList.remove('active');
        }
        seg.onclick = () => {
          if (state.theme !== seg.dataset.theme) {
            state.theme = seg.dataset.theme;
            renderGlobal();
            if (state.mode === 'edit') saveAnnotation();
          }
        };
      });

      renderColorSwatches(
        document.getElementById('connector-colors'),
        state.connectorColor,
        (color) => {
          state.connectorColor = color;
          renderGlobal();
          if (state.mode === 'edit') saveAnnotation();
        }
      );

      document.getElementById('match-stroke').checked = state.matchStroke;

      const btn = document.getElementById('save-btn');
      btn.textContent = state.mode === 'edit' ? 'Done' : 'Create Annotation';
      if (state.mode === 'edit') {
        btn.onclick = () => { parent.postMessage({ pluginMessage: { type: 'close-plugin' } }, '*'); };
      } else {
        btn.onclick = saveAnnotation;
      }
    }

    // Actions
    window.toggleMatchStroke = (checked) => {
      state.matchStroke = checked;
      if (state.mode === 'edit') saveAnnotation();
    };

    window.updateItem = (id, field, value) => {
      const item = state.items.find(i => i.id === id);
      if (item) item[field] = value;
      if (state.mode === 'edit') saveAnnotation();
    };

    window.removeItem = (id) => {
      state.items = state.items.filter(i => i.id !== id);
      renderItems();
      if (state.mode === 'edit') saveAnnotation();
    };

    document.getElementById('add-item').onclick = () => {
      state.items.push({ id: Date.now().toString(), title: '', desc: '', color: '#18A0FB' });
      renderItems();
      if (state.mode === 'edit') saveAnnotation();
    };

    function saveAnnotation() {
      const hasContent = state.items.some(i => i.title.trim() || i.desc.trim());
      if (!hasContent && state.mode !== 'edit') {
        parent.postMessage({ pluginMessage: { type: 'notify', message: 'Please enter at least one annotation.' } }, '*');
        return;
      }

      const payload = {
        theme: state.theme,
        matchStroke: state.matchStroke,
        connectorColor: state.connectorColor,
        items: state.items // Sync all items, including empty, to maintain index harmony
      };

      parent.postMessage({
        pluginMessage: {
          type: state.mode === 'edit' ? 'update-annotation' : 'create-annotation',
          data: payload
        }
      }, '*');
    }

    function updateItemsWithoutLosingFocus(newItems) {
      const container = document.getElementById('items-container');
      const currentIds = state.items.map(i => i.id).join(',');
      const newIds = newItems.map(i => i.id).join(',');

      if (currentIds !== newIds || state.items.length !== newItems.length) {
        state.items = newItems;
        renderItems();
        return;
      }

      state.items = newItems;

      state.items.forEach((item, index) => {
        const card = container.children[index];
        if (card) {
          const titleInput = card.querySelector('input[type="text"]');
          const descInput = card.querySelector('textarea');

          if (titleInput && document.activeElement !== titleInput && titleInput.value !== item.title) {
            titleInput.value = item.title;
          }
          if (descInput && document.activeElement !== descInput && descInput.value !== item.desc) {
            descInput.value = item.desc;
          }

          // Color swatches
          const colorsContainer = card.querySelector('.colors');
          if (colorsContainer) {
            const activeSwatch = colorsContainer.querySelector('.color-swatch.selected');
            if (!activeSwatch || activeSwatch.style.backgroundColor !== hexToRgbStr(item.color)) {
              renderColorSwatches(colorsContainer, item.color, (newColor) => {
                updateItem(item.id, 'color', newColor);
                updateItemsWithoutLosingFocus(state.items);
              });
            }
          }
        }
      });
    }

    function hexToRgbStr(hex) {
      const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
      return result ? `rgb(${parseInt(result[1], 16)}, ${parseInt(result[2], 16)}, ${parseInt(result[3], 16)})` : 'rgb(0, 0, 0)';
    }

    // Listen for state updates from Figma
    onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (msg.type === 'set-state') {
        state.mode = msg.mode;
        if (msg.data) {
          state.theme = msg.data.theme || 'dark';
          state.matchStroke = !!msg.data.matchStroke;
          state.connectorColor = msg.data.connectorColor || '#F24822';

          const newItems = msg.data.items && msg.data.items.length > 0 ? msg.data.items : [{ id: Date.now().toString(), title: '', desc: '', color: '#18A0FB' }];
          updateItemsWithoutLosingFocus(newItems);
        } else {
          // Reset for create mode
          state.theme = 'dark';
          state.matchStroke = false;
          state.connectorColor = '#F24822';
          state.items = [{ id: Date.now().toString(), title: '', desc: '', color: '#18A0FB' }];
          renderItems();
        }
        renderGlobal();
      }
    };

    // Initial render
    renderGlobal();
    renderItems();
  </script>
</body>

</html>
